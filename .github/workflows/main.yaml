name: Shopee Coin Collector

on:
  workflow_dispatch:
  schedule:
    - cron: "10 16 * * *"

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          
      - name: Install dependencies
        run: |
          npm ci
          npm install puppeteer-core
          
      - name: Build TypeScript
        run: |
          npx tsc --lib dom,es2021 --skipLibCheck || true
          echo "Build completed"
          
      - name: Hash username
        id: hash_usr
        run: echo "digest=$(echo -n '${{ secrets.SHOPEE_USR }}' | sha384sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT
        
      - name: Cache cookie
        uses: actions/cache@v4
        with:
          path: env.cookie
          key: cookie-${{ steps.hash_usr.outputs.digest }}
          restore-keys: cookie-${{ steps.hash_usr.outputs.digest }}
          
      - name: Run collector
        run: node collect.js
        env:
          SHOPEE_USR: ${{ secrets.SHOPEE_USR }}
          SHOPEE_PWD: ${{ secrets.SHOPEE_PWD }}
          AES_KEY: ${{ secrets.AES_KEY }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
