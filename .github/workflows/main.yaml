name: Shopee Coin Collector

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

on:
  workflow_dispatch: ~
  schedule:
    - cron: "10 16 * * *"

jobs:
  run-action:
    name: Run action
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile
        run: npx tsc *.ts --lib dom,es2021 --skipLibCheck

      - name: Hash username
        uses: pplanel/hash-calculator-action@v1.3.1
        id: hash_usr
        with:
          input: ${{ secrets.SHOPEE_USR }}
          method: SHA3
          output_len: 384
          truncate: true

      - name: Cache cookie
        id: cache-cookie
        uses: actions/cache@v4
        with:
          path: env.cookie
          key: cookie-${{ steps.hash_usr.outputs.digest }}
          restore-keys: |
            cookie-${{ steps.hash_usr.outputs.digest }}

      - name: Run shopee collector
        run: node collect.js
        env:
          SHOPEE_USR: ${{ secrets.SHOPEE_USR }}
          SHOPEE_PWD: ${{ secrets.SHOPEE_PWD }}
          AES_KEY: ${{ secrets.AES_KEY }}
