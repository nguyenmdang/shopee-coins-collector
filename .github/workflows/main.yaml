name: Shopee Coin Collector

on:
  workflow_dispatch: ~
  schedule:
    - cron: "10 16 * * *"

jobs:
  run-action:
    name: Run action
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Cài đặt Chromium từ apt
      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-codecs-ffmpeg-extra
          echo "Chromium installed at: $(which chromium-browser)"

      - name: Install dependencies
        run: |
          npm ci
          # Chỉ cài puppeteer-core nếu chưa có
          npm install puppeteer-core@latest

      - name: TypeScript compile
        run: npx tsc *.ts --lib dom,es2021 --skipLibCheck

      - name: Hash username
        id: hash_usr
        run: |
          echo "digest=$(echo -n '${{ secrets.SHOPEE_USR }}' | sha384sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Cache cookie
        id: cache-cookie
        uses: actions/cache@v4
        with:
          path: env.cookie
          key: cookie-${{ steps.hash_usr.outputs.digest }}
          restore-keys: |
            cookie-${{ steps.hash_usr.outputs.digest }}

      # Xóa node_modules/puppeteer nếu có để tránh xung đột
      - name: Cleanup puppeteer
        run: |
          rm -rf node_modules/puppeteer || true
          rm -rf ~/.cache/puppeteer || true

      - name: Run shopee collector
        run: node collect.js
        env:
          SHOPEE_USR: ${{ secrets.SHOPEE_USR }}
          SHOPEE_PWD: ${{ secrets.SHOPEE_PWD }}
          AES_KEY: ${{ secrets.AES_KEY }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
